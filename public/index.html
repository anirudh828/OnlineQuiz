<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MindMatrix</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#0f172a;
  color:#e2e8f0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:520px;
  background:#1e293b;
  padding:35px;
  border-radius:28px;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

.title{
  text-align:center;
  font-size:52px;
  margin-bottom:25px;
  font-family:'Audiowide', cursive;
  letter-spacing:3px;
  color:white;
}

input,select{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  background:#334155;
  color:white;
  font-size:14px;
  margin-top:10px;
}

button{
  margin-top:14px;
  padding:12px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-weight:600;
  width:100%;
}

.create-btn{
  background:linear-gradient(135deg,#7c3aed,#9333ea);
  color:white;
}

.join-btn{
  background:#e2e8f0;
  color:black;
}

.avatars{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.avatar{
  font-size:24px;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
}

.avatar.selected{
  background:linear-gradient(135deg,#7c3aed,#9333ea);
}

.option{
  background:#334155;
  padding:10px;
  border-radius:10px;
  margin:6px 0;
  cursor:pointer;
}

.option:hover{
  background:#7c3aed;
}

.correct{
  background:#16a34a !important;
}

.rank-card{
  background:#334155;
  padding:8px;
  border-radius:10px;
  margin:5px 0;
}

.rank-card:nth-child(1){
  background:linear-gradient(135deg,#facc15,#f59e0b);
  color:black;
  font-weight:700;
}

.hidden{display:none;}

#timer{
  font-size:20px;
  margin-bottom:8px;
}

</style>
</head>

<body>

<div class="card">

<!-- HOME -->
<div id="home">
  <div class="title">Mind<br>Matrix</div>

  <input id="nameInput" placeholder="Enter your name">

  <div style="margin-top:10px;">Select Avatar</div>
  <div class="avatars">
    <div class="avatar selected" onclick="selectAvatar(this)">😎</div>
    <div class="avatar" onclick="selectAvatar(this)">🔥</div>
    <div class="avatar" onclick="selectAvatar(this)">👑</div>
    <div class="avatar" onclick="selectAvatar(this)">🤖</div>
  </div>

  <div style="margin-top:12px;">Difficulty</div>
  <select id="difficulty">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
  </select>

  <div>Category</div>
  <select id="category">
    <option value="mix">Mix (All)</option>
    <option value="9">General Knowledge</option>
    <option value="17">Science & Nature</option>
    <option value="23">History</option>
    <option value="21">Sports</option>
    <option value="18">Computers</option>
    <option value="11">Movies</option>
  </select>

  <input id="maxQ" type="number" value="5">

  <button class="create-btn" onclick="createRoom()">Create Room</button>

  <hr style="margin:20px 0;border:1px solid #334155;">

  <input id="joinCode" placeholder="Enter Room Code">
  <button class="join-btn" onclick="joinRoom()">Join Room</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="hidden">
  <h3>Room Code: <span id="roomCode"></span></h3>
  <div id="players"></div>
  <button class="create-btn" id="startBtn" onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div id="qCount"></div>
  <div id="timer"></div>
  <h2 id="question" style="margin:8px 0;"></h2>

  <div id="options"></div>

  <h3 id="result"></h3>

  <h3 style="margin-top:12px;">Leaderboard</h3>
  <div id="leaderboard"></div>
</div>

<!-- END -->
<div id="end" class="hidden">
  <h2 id="winner"></h2>
  <div id="podium"></div>
  <button class="create-btn" onclick="location.reload()">Play Again</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let selectedAvatar="😎";
let myName="";
let timerInterval;

// Elements
const home=document.getElementById("home");
const lobby=document.getElementById("lobby");
const game=document.getElementById("game");
const end=document.getElementById("end");

const nameInput=document.getElementById("nameInput");
const difficulty=document.getElementById("difficulty");
const category=document.getElementById("category");
const maxQ=document.getElementById("maxQ");

const qCount=document.getElementById("qCount");
const question=document.getElementById("question");
const options=document.getElementById("options");
const result=document.getElementById("result");
const leaderboard=document.getElementById("leaderboard");
const timer=document.getElementById("timer");

function selectAvatar(el){
  document.querySelectorAll(".avatar").forEach(a=>a.classList.remove("selected"));
  el.classList.add("selected");
  selectedAvatar=el.innerText;
}

function createRoom(){
  const name=nameInput.value.trim();
  if(!name) return alert("Enter name");

  myName=name;

  socket.emit("create-room",{
    name,
    maxQuestions:maxQ.value,
    difficulty:difficulty.value,
    category:category.value,
    avatar:selectedAvatar
  });
}

function joinRoom(){
  const name=nameInput.value.trim();
  const code=document.getElementById("joinCode").value.trim();
  if(!name||!code) return alert("Enter name & code");

  myName=name;

  socket.emit("join-room",{
    name,
    roomCode:code,
    avatar:selectedAvatar
  });
}

socket.on("error",(msg)=>alert(msg));

socket.on("room-joined",(data)=>{
  home.classList.add("hidden");
  lobby.classList.remove("hidden");
  document.getElementById("roomCode").innerText=data.roomCode;
  document.getElementById("startBtn").style.display=data.isHost?"block":"none";
});

socket.on("lobby-update",(players)=>{
  document.getElementById("players").innerHTML=
    players.map(p=>`<div>${p.avatar} ${p.name}</div>`).join("");
});

function startGame(){
  socket.emit("start-game");
}

socket.on("new-question",(data)=>{
  lobby.classList.add("hidden");
  game.classList.remove("hidden");

  qCount.innerText=`Question ${data.qNum}/${data.max}`;
  question.innerHTML=data.q.text;
  result.innerText="";
  options.innerHTML="";

  let timeLeft=data.time/1000;
  timer.innerText=`⏳ ${timeLeft}s`;

  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    timer.innerText=`⏳ ${timeLeft}s`;
    if(timeLeft<=0) clearInterval(timerInterval);
  },1000);

  data.q.options.forEach(opt=>{
    const div=document.createElement("div");
    div.className="option";
    div.innerHTML=opt;
    div.onclick=()=>{
      socket.emit("submit-answer",opt);
      Array.from(options.children).forEach(c=>c.onclick=null);
    };
    options.appendChild(div);
  });
});

socket.on("leaderboard-update",(players)=>{
  leaderboard.innerHTML=
    players.map((p,i)=>`
      <div class="rank-card">
        ${i===0?"🥇":i===1?"🥈":i===2?"🥉":"🎯"} 
        ${p.avatar} ${p.name} - ${p.score}
      </div>
    `).join("");
});

socket.on("reveal-answer",(correct)=>{
  clearInterval(timerInterval);
  document.querySelectorAll(".option").forEach(o=>{
    if(o.innerHTML===correct) o.classList.add("correct");
  });
});

socket.on("result",(data)=>{
  result.innerText=data.correct?"Correct! 🎉":"Wrong ❌";
});

socket.on("game-over",(players)=>{
  game.classList.add("hidden");
  end.classList.remove("hidden");

  document.getElementById("winner").innerText=
    players[0].name===myName?"🏆 YOU WIN!":"💀 YOU LOST";

  document.getElementById("podium").innerHTML=
    players.map((p,i)=>`
      <div class="rank-card">
        ${i===0?"🥇":i===1?"🥈":"🥉"} ${p.avatar} ${p.name} - ${p.score}
      </div>
    `).join("");
});

</script>
</body>
</html>
