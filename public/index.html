<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MindMatrix</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
.github-btn{
  display:inline-block;
  margin-top:6px;
  padding:6px 14px;
  border-radius:14px;
  background:#334155;
  color:#e2e8f0;
  text-decoration:none;
  font-size:13px;
  transition:0.3s;
}

.github-btn:hover{
  background:#7c3aed;
  color:white;
}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#0f172a;
  color:#e2e8f0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}
.github-link{
  color:#cbd5e1;
  text-decoration:none;
  font-size:13px;
  transition:0.3s;
}

.github-link:hover{
  color:#7c3aed;
}
.card{
  width:100%;
  max-width:520px;
  background:#1e293b;
  padding:40px 35px;
  border-radius:28px;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

.title{
  text-align:center;
  font-size:32px;
  font-weight:700;
  margin-bottom:30px;
}

input, select{
  width:100%;
  padding:18px;
  border-radius:20px;
  border:none;
  background:#334155;
  color:white;
  font-size:16px;
  margin-top:15px;
  outline:none;
}

input:focus, select:focus{
  box-shadow:0 0 0 2px #7c3aed;
}

.label{
  margin-top:25px;
  font-size:14px;
  color:#cbd5e1;
}

.avatars{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

.avatar{
  font-size:28px;
  padding:16px;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}

.avatar.selected{
  background:linear-gradient(135deg,#7c3aed,#9333ea);
  box-shadow:0 0 25px #7c3aed;
}

.create-btn{
  margin-top:25px;
  padding:18px;
  border-radius:24px;
  background:linear-gradient(135deg,#7c3aed,#9333ea);
  color:white;
  font-weight:600;
  border:none;
  cursor:pointer;
  width:100%;
}

.join-btn{
  background:#e2e8f0;
  color:black;
  font-weight:600;
  border:none;
  border-radius:24px;
  padding:18px;
  width:100%;
  margin-top:15px;
  cursor:pointer;
}

.divider{
  height:1px;
  background:#334155;
  margin:35px 0;
}

.option{
  background:#334155;
  padding:16px;
  border-radius:16px;
  margin:10px 0;
  cursor:pointer;
  transition:0.2s;
}

.option:hover{
  background:#7c3aed;
}

.correct{
  background:#16a34a !important;
}

.hidden{display:none;}

#players div{
  background:#334155;
  padding:12px;
  border-radius:16px;
  margin:8px 0;
}

.rank-card{
  background:#334155;
  padding:14px;
  border-radius:16px;
  margin:8px 0;
}

.rank-card:nth-child(1){
  background:linear-gradient(135deg,#facc15,#f59e0b);
  color:black;
  font-weight:700;
}
.rank-card:nth-child(2){
  background:linear-gradient(135deg,#e5e7eb,#9ca3af);
  color:black;
}
.rank-card:nth-child(3){
  background:linear-gradient(135deg,#f97316,#ea580c);
  color:black;
}

/* CREDITS SECTION */
.credits{
  margin-top:40px;
  text-align:center;
  font-size:13px;
  color:#94a3b8;
  line-height:1.6;
}

.credits strong{
  background:linear-gradient(135deg,#7c3aed,#9333ea);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-weight:700;
}
</style>
</head>
<body>

<div class="card">

<div id="home">

<div class="title">MindMatrix</div>

<input id="name" placeholder="Enter your name">

<div class="label">Select Avatar</div>
<div class="avatars">
  <div class="avatar selected" onclick="selectAvatar(this)">😎</div>
  <div class="avatar" onclick="selectAvatar(this)">🔥</div>
  <div class="avatar" onclick="selectAvatar(this)">👑</div>
  <div class="avatar" onclick="selectAvatar(this)">🤖</div>

</div>

<div class="label">Create Room</div>

<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<input id="maxQ" type="number" value="5">

<button class="create-btn" onclick="createRoom()">Create Room</button>

<div class="divider"></div>

<div class="label">Join Room</div>

<input id="joinCode" placeholder="Enter Room Code">

<button class="join-btn" onclick="joinRoom()">Join Room</button>

<!-- CREDITS -->
<div class="credits">
  Built by <strong>S. Anirudh Reddy</strong><br>

  <a href="https://github.com/anirudh828" 
     target="_blank" 
     rel="noopener noreferrer"
     class="github-btn">
     My GitHub Link
  </a><br>

  © 2026 MindMatrix<br>
  Version 1.0.0
</div>

</div>

<div id="lobby" class="hidden">
  <h3>Room Code: <span id="roomCode"></span></h3>
  <div id="players"></div>
  <button class="create-btn" id="startBtn" onclick="startGame()">Start Game</button>
</div>

<div id="game" class="hidden">
  <div id="qCount"></div>
  <h2 id="question" style="margin:20px 0;"></h2>
  <div id="options"></div>
  <h3 id="result"></h3>
</div>

<div id="end" class="hidden">
  <h2 id="winner"></h2>
  <div id="podium"></div>
  <button class="create-btn" onclick="location.reload()">Play Again</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myName="";
let selectedAvatar="😎";
let isHost=false;

function selectAvatar(el){
  document.querySelectorAll(".avatar").forEach(a=>a.classList.remove("selected"));
  el.classList.add("selected");
  selectedAvatar=el.innerText;
}

function createRoom(){
  const name=document.getElementById("name").value.trim();
  const maxQuestions=document.getElementById("maxQ").value;
  const difficulty=document.getElementById("difficulty").value;
  if(!name) return alert("Enter name");
  myName=name;
  socket.emit("create-room",{name,maxQuestions,difficulty});
}

function joinRoom(){
  const name=document.getElementById("name").value.trim();
  const roomCode=document.getElementById("joinCode").value.trim();
  if(!name||!roomCode) return alert("Enter name & code");
  myName=name;
  socket.emit("join-room",{name,roomCode});
}

socket.on("room-joined",(data)=>{
  document.getElementById("home").classList.add("hidden");
  document.getElementById("lobby").classList.remove("hidden");
  document.getElementById("roomCode").innerText=data.roomCode;
  isHost=data.isHost;
  document.getElementById("startBtn").style.display=isHost?"block":"none";
});

socket.on("lobby-update",(players)=>{
  document.getElementById("players").innerHTML=
    players.map(p=>`<div>${p.name}</div>`).join("");
});

function startGame(){
  socket.emit("start-game");
}

socket.on("new-question",(data)=>{
  document.getElementById("lobby").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  document.getElementById("qCount").innerText=
    `Question ${data.qNum}/${data.max}`;

  document.getElementById("question").innerHTML=data.q.text;
  document.getElementById("result").innerText="";

  const box=document.getElementById("options");
  box.innerHTML="";
  data.q.options.forEach(opt=>{
    const div=document.createElement("div");
    div.className="option";
    div.innerHTML=opt;
    div.onclick=()=>{
      socket.emit("submit-answer",opt);
      Array.from(box.children).forEach(c=>c.onclick=null);
    };
    box.appendChild(div);
  });
});

socket.on("reveal-answer",(correct)=>{
  document.querySelectorAll(".option").forEach(o=>{
    if(o.innerHTML===correct){
      o.classList.add("correct");
    }
  });
});

socket.on("result",(data)=>{
  document.getElementById("result").innerText=
    data.correct?"Correct! 🎉":"Wrong ❌";
});

socket.on("game-over",(players)=>{
  document.getElementById("game").classList.add("hidden");
  document.getElementById("end").classList.remove("hidden");

  document.getElementById("winner").innerText=
    players[0].name===myName?"🏆 YOU WIN!":"💀 YOU LOST";

  document.getElementById("podium").innerHTML=
    players.map((p,i)=>`
      <div class="rank-card">
        ${i===0?"🥇":i===1?"🥈":"🥉"} ${p.name} - ${p.score}
      </div>
    `).join("");
});
</script>

</body>
</html>
